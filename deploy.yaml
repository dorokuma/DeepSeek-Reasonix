# deploy.yaml — Reasonix 部署配置
#
# 项目类型: Go 单二进制 CLI
# 构建方式: CGO_ENABLED=0, Go 1.25
# 配置文件: reasonix.toml (支持 TOML 格式)
#
# 本配置是 Docker Compose 格式，用于 docker-compose / docker compose 部署。
#
# 前置条件: 同级目录需有 Dockerfile（已自动生成）
#
# 使用方式:
#   构建镜像:
#     docker compose -f deploy.yaml build
#
#   运行 CLI 模式 (一次性的):
#     docker compose -f deploy.yaml run --rm reasonix reasonix chat
#
#   运行单次任务:
#     docker compose -f deploy.yaml run --rm reasonix reasonix run "task description"
#
#   设置 API 密钥:
#     DEEPSEEK_API_KEY=sk-xxx docker compose -f deploy.yaml run --rm reasonix reasonix chat

services:
  reasonix:
    # 构建配置
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Go 版本与 go.mod 保持一致
        GO_VERSION: "1.25"
        # 构建时注入版本号
        APP_VERSION: "${APP_VERSION:-dev}"
      target: production

    # 镜像名称
    image: reasonix:${APP_VERSION:-latest}

    # 容器名称
    container_name: reasonix

    # 默认显示帮助
    command: ["reasonix", "--help"]

    # 环境变量
    environment:
      # API 密钥通过环境变量注入，勿写入配置文件
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # 日志级别
      - REASONIX_LOG_LEVEL=${REASONIX_LOG_LEVEL:-info}
      # 语言 (auto/en/zh)
      - REASONIX_LANG=${REASONIX_LANG:-auto}
      # 主题 (auto/dark/light)
      - REASONIX_THEME=${REASONIX_THEME:-auto}

    # 配置文件挂载
    volumes:
      # 主配置文件
      - ./reasonix.toml:/app/reasonix.toml:ro
      # 会话数据持久化
      - reasonix_data:/app/data

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
        reservations:
          cpus: "0.25"
          memory: "128M"

    # 重启策略
    restart: unless-stopped

    # 安全配置
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── 持久化数据卷 ──────────────────────────────────────────────
volumes:
  reasonix_data:
    name: reasonix_data
    labels:
      app: reasonix
      description: "Reasonix session data and configuration"
