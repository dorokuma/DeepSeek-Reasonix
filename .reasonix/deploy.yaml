# Deploy config for reasonix bridge (Telegram bot)
language: go

build:
  cmd: CGO_ENABLED=0 go build -ldflags="-s -w" -o /usr/local/bin/reasonix-telegram ./cmd/bridge/
  output: /usr/local/bin/reasonix-telegram

install:
  cmd: cp cmd/bridge/deploy/reasonix-telegram.service /etc/systemd/system/reasonix-telegram.service && systemctl daemon-reload && systemctl restart reasonix-telegram
